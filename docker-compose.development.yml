services:
  db:
    image: postgres:18
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: "4000"
      JWT_SECRET: "dev-secret-change-me-pls"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/library
    build:
      context: .
      dockerfile: ./devops/docker/Dockerfile.backend
    command: npm run start
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    environment:
      NODE_ENV: development
      API_PROXY_TARGET: "http://backend:4000"
    build:
      context: .
      dockerfile: ./devops/docker/Dockerfile.frontend
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
