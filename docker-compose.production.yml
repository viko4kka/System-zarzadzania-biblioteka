services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - library-network

  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./devops/docker/Dockerfile.backend
      target: prod
    environment:
      NODE_ENV: production
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "${BACKEND_PORT}:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - library-network

  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./devops/docker/Dockerfile.frontend
      target: prod
      args:
        VITE_BACKEND_SERVER: ${VITE_BACKEND_SERVER}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - library-network

volumes:
  pgdata:

networks:
  library-network:
    driver: bridge
